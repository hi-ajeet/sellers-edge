<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sellers Edge</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Barlow+Condensed:wght@800;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      background: #0b0f1a;
      color: #e8edf7;
      width: 280px;
      padding: 0;
      overflow: hidden;
    }

    .header {
      background: #111827;
      border-bottom: 1px solid #1e2d4a;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header img {
      height: 32px;
      width: auto;
      border-radius: 4px;
    }

    .header-text .brand {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 17px;
      letter-spacing: -0.01em;
    }

    .header-text .brand span { color: #0a64df; }

    .header-text .sub {
      font-size: 9px;
      color: #6b7fa3;
      letter-spacing: 0.08em;
      margin-top: -1px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: #0f1520;
      border-bottom: 1px solid #1e2d4a;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.connected { background: #22c55e; animation: pulse 2s infinite; }
    .dot.disconnected { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 12px;
      font-weight: 600;
    }

    .status-text.connected { color: #4ade80; }
    .status-text.disconnected { color: #ef4444; }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: #1e2d4a;
      border-bottom: 1px solid #1e2d4a;
    }

    .stat {
      background: #111827;
      padding: 12px 16px;
      text-align: center;
    }

    .stat-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 30px;
      line-height: 1;
    }

    .stat-label {
      font-size: 10px;
      color: #6b7fa3;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-top: 2px;
    }

    .actions {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      border: none;
      border-radius: 6px;
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      font-size: 12px;
      padding: 9px;
      cursor: pointer;
      width: 100%;
      transition: all 0.15s;
    }

    .btn-primary {
      background: #0a64df;
      color: white;
    }
    .btn-primary:hover { background: #1a74ef; }

    .btn-ghost {
      background: transparent;
      color: #6b7fa3;
      border: 1px solid #1e2d4a;
    }
    .btn-ghost:hover { border-color: #0a64df; color: #e8edf7; }

    .btn-pause {
      background: transparent;
      color: #f59e0b;
      border: 1px solid #f59e0b44;
    }
    .btn-pause:hover { background: #f59e0b22; }

    .footer {
      padding: 8px 16px;
      font-size: 10px;
      color: #3a4a6b;
      border-top: 1px solid #1e2d4a;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48-active.png" alt="SE" id="logo" />
    <div class="header-text">
      <div class="brand">SELLERS <span>EDGE</span></div>
      <div class="sub">AUTOMATIC WHATNOT LABELING</div>
    </div>
  </div>

  <div class="status-bar">
    <div class="dot disconnected" id="statusDot"></div>
    <span class="status-text disconnected" id="statusText">Desktop app not running</span>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" style="color: #22c55e" id="countSold">0</div>
      <div class="stat-label">SOLD</div>
    </div>
    <div class="stat">
      <div class="stat-value" style="color: #f59e0b" id="countGiveaway">0</div>
      <div class="stat-label">GIVEAWAY</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-pause" id="btnPause">⏸ Pause Auto-Print</button>
    <button class="btn btn-ghost" id="btnReset">Reset Session Counter</button>
  </div>

  <div class="footer">Sellers Edge v1.0.0 — sellersedge.app</div>

  <script src="popup.js"></script>
</body>
</html>
